<!-- Winner Modal -->
<div id="winner-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" style="animation: fadeIn 0.3s ease-in-out;">
  <div class="bg-gradient-to-br from-yellow-50 via-orange-50 to-pink-50 rounded-3xl border-4 border-yellow-400 shadow-2xl p-8 max-w-md mx-4 text-center transform animate-bounce-in" style="animation: bounceIn 0.5s ease-out;">
    <div class="mb-4">
      <span class="text-8xl animate-pulse">🏆</span>
    </div>
    
    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 via-orange-600 to-pink-600 mb-2">
      GAME OVER!
    </h1>
    
    <div class="bg-white/70 rounded-2xl border-2 border-yellow-300 p-6 my-4">
      <p class="text-lg font-bold text-slate-800 mb-2">🎉 Winner 🎉</p>
      <p class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600">
        {{ winner_name }}
      </p>
      <p class="text-sm text-slate-600 mt-2">
        Final Score: <span class="font-bold text-emerald-700">{{ winner_score }}</span>
      </p>
    </div>
    
    <div class="space-y-2 text-sm text-slate-700">
      <p class="font-medium">🎊 All players have reached the target! 🎊</p>
      <p class="text-xs text-slate-500">Lowest score wins!</p>
    </div>
    
    <button 
      onclick="document.getElementById('winner-modal').remove()"
      class="mt-6 px-6 py-3 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold shadow-lg hover:shadow-xl transition-all">
      Close
    </button>
  </div>
</div>

<style>
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}
</style>
