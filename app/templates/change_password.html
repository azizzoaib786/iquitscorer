<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Change Password — I Quit Scoreboard</title>
  </head>
  <body class="bg-gradient-to-br from-violet-100 via-pink-100 to-orange-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <div class="bg-gradient-to-br from-violet-50 to-pink-50 rounded-3xl border-2 border-violet-300 shadow-2xl p-8">
        <div class="text-center mb-6">
          <div class="text-6xl mb-3">🔐</div>
          <h1 class="text-3xl font-bold text-violet-900 mb-2">Change Password</h1>
          <p class="text-violet-700">Update your account password</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 rounded-xl bg-gradient-to-r from-rose-50 to-red-50 border-2 border-rose-300 text-rose-800 text-sm font-medium">
          ❌ {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-4 p-3 rounded-xl bg-gradient-to-r from-emerald-50 to-teal-50 border-2 border-emerald-300 text-emerald-800 text-sm font-medium">
          ✅ {{ success }}
        </div>
        {% endif %}

        <form method="post" action="/change-password" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-violet-900 mb-1">Current Password</label>
            <input 
              type="password" 
              name="current_password" 
              required 
              autofocus
              class="w-full rounded-xl border-2 border-violet-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-200 px-4 py-3 transition-all"
              placeholder="Enter current password"
            />
          </div>

          <div>
            <label class="block text-sm font-bold text-violet-900 mb-1">New Password</label>
            <input 
              type="password" 
              name="new_password" 
              required 
              minlength="6"
              class="w-full rounded-xl border-2 border-violet-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-200 px-4 py-3 transition-all"
              placeholder="Enter new password (min 6 chars)"
            />
          </div>

          <div>
            <label class="block text-sm font-bold text-violet-900 mb-1">Confirm New Password</label>
            <input 
              type="password" 
              name="confirm_password" 
              required 
              minlength="6"
              class="w-full rounded-xl border-2 border-violet-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-200 px-4 py-3 transition-all"
              placeholder="Confirm new password"
            />
          </div>

          <button 
            type="submit"
            class="w-full rounded-xl bg-gradient-to-r from-violet-600 to-pink-600 hover:from-violet-700 hover:to-pink-700 text-white px-6 py-4 text-lg font-bold shadow-lg hover:shadow-xl transition-all">
            🔒 Update Password
          </button>
        </form>

        <div class="mt-6 text-center">
          <a href="/" class="text-sm font-bold text-violet-600 hover:text-violet-700 underline">← Back to Home</a>
        </div>
      </div>

      <div class="mt-4 text-center">
        <p class="text-sm text-violet-600 font-medium">
          💻 Developed by <span class="font-bold bg-gradient-to-r from-violet-600 to-pink-600 bg-clip-text text-transparent">Aziz Zoaib</span>
        </p>
      </div>
    </div>
  </body>
</html>
