<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>404 — Not Found</title>
  </head>
  <body class="bg-gradient-to-br from-rose-100 via-orange-100 to-pink-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full">
      <div class="bg-gradient-to-br from-rose-50 to-orange-50 rounded-3xl border-2 border-rose-300 shadow-2xl p-8 text-center">
        <div class="text-8xl mb-4">🎯</div>
        <h1 class="text-6xl font-bold text-rose-900 mb-2">404</h1>
        <h2 class="text-2xl font-bold text-rose-800 mb-4">Page Not Found</h2>
        <p class="text-rose-700 mb-6">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="inline-block px-6 py-3 font-bold text-white bg-gradient-to-r from-rose-500 to-pink-500 rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all">
          🏠 Go Home
        </a>
      </div>
      <div class="mt-4 text-center">
        <p class="text-sm text-rose-600 font-medium">
          💻 Developed by <span class="font-bold bg-gradient-to-r from-rose-600 to-pink-600 bg-clip-text text-transparent">Aziz Zoaib</span>
        </p>
      </div>
    </div>
  </body>
</html>
